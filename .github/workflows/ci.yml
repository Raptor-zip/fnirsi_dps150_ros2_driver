name: CI

on:
  push:
  pull_request:

jobs:
  humble:
    runs-on: ubuntu-22.04
    container: ros:humble-ros-base-jammy

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            libxml2-utils \
            ros-humble-ament-cmake-gtest \
            ros-humble-diagnostic-updater \
            ros-humble-std-msgs \
            ros-humble-std-srvs

      - name: Build
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --packages-select fnirsi_dps150_driver --event-handlers console_direct+

      - name: Test
        run: |
          . /opt/ros/humble/setup.sh
          colcon test --packages-select fnirsi_dps150_driver --event-handlers console_direct+
          colcon test-result --verbose

      - name: XML lint
        run: xmllint --noout package.xml launch/dps150.launch.xml
