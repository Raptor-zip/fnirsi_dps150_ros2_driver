name: CI

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: humble
            runner: ubuntu-22.04
            container: ros:humble-ros-base-jammy
          - distro: jazzy
            runner: ubuntu-24.04
            container: ros:jazzy-ros-base-noble

    name: ${{ matrix.distro }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          # Retry to tolerate transient ROS apt-mirror sync lag (stale index -> 404).
          for attempt in 1 2 3 4 5; do
            apt-get update
            if apt-get install -y \
              libxml2-utils \
              ros-${{ matrix.distro }}-ament-cmake-gtest \
              ros-${{ matrix.distro }}-diagnostic-updater \
              ros-${{ matrix.distro }}-std-msgs \
              ros-${{ matrix.distro }}-std-srvs; then
              exit 0
            fi
            echo "Install attempt ${attempt} failed; retrying in 15s..."
            sleep 15
          done
          echo "Dependency install failed after 5 attempts" >&2
          exit 1

      - name: Build
        run: |
          . /opt/ros/${{ matrix.distro }}/setup.sh
          colcon build --packages-select fnirsi_dps150_driver --event-handlers console_direct+

      - name: Test
        run: |
          . /opt/ros/${{ matrix.distro }}/setup.sh
          colcon test --packages-select fnirsi_dps150_driver --event-handlers console_direct+
          colcon test-result --verbose

      - name: XML lint
        run: xmllint --noout package.xml launch/dps150.launch.xml
